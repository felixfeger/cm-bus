<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Admin — City Metro Transit</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #111;
  --white: #fff;
  --yellow: #FFD600;
  --gray: #f4f4f4;
  --border: #e0e0e0;
  --mid: #888;
  --danger: #d93025;
  --green: #1a8a3c;
  --panel: 300px;
}
body { font-family: Helvetica, Arial, sans-serif; background: var(--white); color: var(--black); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Header */
header { background: var(--black); color: var(--white); display: flex; align-items: center; gap: 14px; padding: 0 16px; height: 50px; flex-shrink: 0; }
header h1 { font-size: 13px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; }
.hdr-badge { background: var(--yellow); color: var(--black); font-size: 9px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.hdr-status { font-size: 11px; color: rgba(255,255,255,0.5); }
.hdr-btn { background: var(--yellow); border: none; padding: 5px 12px; font-family: inherit; font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 2px; }

/* Toolbar */
.toolbar { background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; padding: 7px 14px; flex-shrink: 0; overflow-x: auto; }
.tg { display: flex; align-items: center; gap: 4px; padding-right: 12px; border-right: 1px solid var(--border); margin-right: 4px; flex-shrink: 0; }
.tg:last-child { border-right: none; }
.tl { font-size: 9px; color: var(--mid); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 2px; flex-shrink: 0; }
.tb { background: var(--gray); border: 1px solid var(--border); padding: 5px 10px; font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 2px; transition: all 0.12s; white-space: nowrap; }
.tb:hover { background: var(--black); color: var(--white); border-color: var(--black); }
.tb.on { background: var(--black); color: var(--yellow); border-color: var(--black); }
#rSel { font-family: inherit; font-size: 11px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 2px; background: var(--white); min-width: 170px; }
#distBadge { font-size: 11px; font-weight: 800; background: var(--yellow); padding: 4px 10px; border-radius: 2px; white-space: nowrap; }

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Canvas */
.cw { flex: 1; position: relative; overflow: hidden; background: #f0f0f0; }
#cv { display: block; }
.hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.72); color: #fff; font-size: 11px; padding: 5px 14px; border-radius: 20px; pointer-events: none; white-space: nowrap; }

/* Panel */
.panel { width: var(--panel); background: var(--white); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.ptabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ptab { flex: 1; padding: 9px 4px; font-size: 10px; font-weight: 800; text-align: center; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mid); border-bottom: 2px solid transparent; transition: all 0.12s; }
.ptab.on { color: var(--black); border-bottom-color: var(--yellow); }
.pbody { flex: 1; overflow-y: auto; padding: 14px; }

/* Form elements */
.fr { margin-bottom: 11px; }
.fr label { display: block; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--mid); margin-bottom: 4px; }
.fr input, .fr select, .fr textarea { width: 100%; font-family: inherit; font-size: 12px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 2px; background: var(--white); }
.fr input:focus, .fr select:focus, .fr textarea:focus { outline: none; border-color: var(--black); }
.fr textarea { min-height: 55px; resize: vertical; }
.cr { display: flex; gap: 6px; align-items: center; }
.cr input[type=color] { width: 34px; height: 30px; padding: 1px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; flex-shrink: 0; }
.btn { width: 100%; padding: 8px; font-family: inherit; font-size: 12px; font-weight: 800; cursor: pointer; border-radius: 2px; border: none; }
.btn-blk { background: var(--black); color: var(--yellow); }
.btn-blk:hover { background: #222; }
.btn-sec { background: var(--gray); color: var(--black); border: 1px solid var(--border); margin-top: 5px; }
.btn-red { background: var(--danger); color: #fff; margin-top: 5px; }
.sec-title { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--mid); margin-bottom: 9px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* List items */
.li { display: flex; align-items: center; gap: 8px; padding: 8px 9px; border: 1px solid var(--border); border-radius: 2px; margin-bottom: 5px; cursor: pointer; transition: all 0.12s; }
.li:hover { border-color: var(--black); }
.li.on { border-color: var(--black); background: var(--gray); }
.li-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.li-name { font-size: 12px; font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-meta { font-size: 10px; color: var(--mid); flex-shrink: 0; }
.li-del { font-size: 17px; color: var(--mid); cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1; }
.li-del:hover { color: var(--danger); }

/* Rail tags */
.rail-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; min-height: 24px; }
.rtag { display: inline-flex; align-items: center; gap: 4px; background: var(--gray); border: 1px solid var(--border); border-radius: 20px; padding: 2px 7px; font-size: 10px; }
.rtag .rm { cursor: pointer; color: var(--mid); font-weight: 800; margin-left: 2px; }
.rtag .rm:hover { color: var(--danger); }
.radd { display: flex; gap: 5px; }
.radd select, .radd input { flex: 1; font-family: inherit; font-size: 11px; padding: 5px; border: 1px solid var(--border); border-radius: 2px; }
.radd button { background: var(--black); color: var(--white); border: none; padding: 5px 9px; font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 2px; font-weight: 700; white-space: nowrap; }

/* Speed display */
.spd { font-size: 30px; font-weight: 900; text-align: center; padding: 10px; background: var(--yellow); border-radius: 2px; margin-bottom: 10px; line-height: 1; }
.spd small { font-size: 12px; font-weight: 400; }

/* Status dot */
.sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Toast */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--black); color: var(--white); padding: 9px 18px; border-radius: 3px; font-size: 12px; display: none; z-index: 9999; white-space: nowrap; }

/* Auth modal */
.mo { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: none; align-items: center; justify-content: center; }
.mo.open { display: flex; }
.mbox { background: var(--white); padding: 24px; border-radius: 4px; width: 300px; }
.mbox h2 { font-size: 16px; margin-bottom: 14px; }
.mbox input { width: 100%; padding: 8px 10px; font-family: inherit; font-size: 13px; border: 1px solid var(--border); border-radius: 2px; margin-bottom: 10px; }
.mbox button { width: 100%; padding: 9px; background: var(--black); color: var(--yellow); border: none; font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="4" fill="#333"/><rect x="5" y="10" width="22" height="14" rx="2" fill="#FFD600"/><rect x="7" y="12" width="7" height="5" rx="1" fill="#333"/><rect x="18" y="12" width="7" height="5" rx="1" fill="#333"/><circle cx="10" cy="25" r="2.5" fill="#333" stroke="#FFD600" stroke-width="1.5"/><circle cx="22" cy="25" r="2.5" fill="#333" stroke="#FFD600" stroke-width="1.5"/></svg>
  <h1>City Metro Transit</h1>
  <span class="hdr-badge">Bus Admin</span>
  <div class="hdr-right">
    <span class="hdr-status" id="hdrStatus">Not signed in</span>
    <button class="hdr-btn" id="hdrBtn" onclick="toggleAuth()">Sign In</button>
  </div>
</header>

<div class="toolbar">
  <div class="tg">
    <span class="tl">Route</span>
    <select id="rSel"><option value="">— Select route —</option></select>
  </div>
  <div class="tg">
    <span class="tl">Tool</span>
    <button class="tb" id="tDraw" onclick="setTool('draw')">✏ Draw</button>
    <button class="tb" id="tStop" onclick="setTool('stop')">● Stop</button>
    <button class="tb" id="tSelect" onclick="setTool('select')">↖ Select</button>
    <button class="tb" id="tBus" onclick="setTool('bus')">🚌 Bus</button>
  </div>
  <div class="tg">
    <button class="tb" onclick="undoPt()">↩ Undo</button>
    <button class="tb" onclick="clearPts()">Clear Path</button>
    <button class="tb" onclick="savePath()">💾 Save Path</button>
  </div>
  <div class="tg">
    <span id="distBadge">0.00 mi</span>
  </div>
</div>

<div class="main">
  <div class="cw">
    <canvas id="cv"></canvas>
    <div class="hint" id="hint">Sign in and select or create a route to begin</div>
  </div>
  <div class="panel">
    <div class="ptabs">
      <div class="ptab on" data-tab="routes" onclick="showTab('routes')">Routes</div>
      <div class="ptab" data-tab="stops" onclick="showTab('stops')">Stops</div>
      <div class="ptab" data-tab="buses" onclick="showTab('buses')">Buses</div>
    </div>
    <div class="pbody" id="pbody"></div>
  </div>
</div>

<!-- Auth modal -->
<div class="mo" id="mo" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="mbox">
    <h2>Admin Sign In</h2>
    <input type="password" id="keyInput" placeholder="Admin key" onkeydown="if(event.key==='Enter')doAuth()">
    <button onclick="doAuth()">Sign In</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────
const API = 'https://city-metro-bus-api.felixfeger46.workers.dev';
const RAIL_LINES = [
  { id:'A', name:'A Line', color:'#0057A8' },
  { id:'B', name:'B Line', color:'#CC0000' },
  { id:'D', name:'D Line', color:'#7B2D8B' },
  { id:'E', name:'E Line', color:'#F5A623' },
  { id:'F', name:'F Line', color:'#FF6B00' },
  { id:'K', name:'K Line', color:'#E91E8C' },
];

// ── State ────────────────────────────────────────────────────────
let key = localStorage.getItem('cmt_bus_key') || '';
let tool = 'select';
let routes = [], stops = [], buses = [];
let activeRoute = null;
let pts = [];          // current draw path (unsaved)
let selStop = null;
let selBus = null;
let tab = 'routes';
let drag = null;

// ── Canvas ───────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function resizeCv() {
  const w = cv.parentElement;
  cv.width = w.clientWidth;
  cv.height = w.clientHeight;
  render();
}
window.addEventListener('resize', resizeCv);

// ── Auth ─────────────────────────────────────────────────────────
function toggleAuth() {
  if (key) {
    key = '';
    localStorage.removeItem('cmt_bus_key');
    document.getElementById('hdrStatus').textContent = 'Not signed in';
    document.getElementById('hdrBtn').textContent = 'Sign In';
    toast('Signed out');
  } else {
    document.getElementById('keyInput').value = '';
    document.getElementById('mo').classList.add('open');
    setTimeout(() => document.getElementById('keyInput').focus(), 100);
  }
}

function doAuth() {
  const v = document.getElementById('keyInput').value.trim();
  if (!v) return;
  key = v;
  localStorage.setItem('cmt_bus_key', key);
  document.getElementById('mo').classList.remove('open');
  document.getElementById('hdrStatus').textContent = 'Authenticated';
  document.getElementById('hdrBtn').textContent = 'Sign Out';
  toast('Signed in');
  loadAll();
}

if (key) {
  document.getElementById('hdrStatus').textContent = 'Authenticated';
  document.getElementById('hdrBtn').textContent = 'Sign Out';
}

// ── API ───────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type':'application/json', Authorization:`Bearer ${key}` } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API + path, opts);
    const d = await r.json();
    if (d.error) { toast('Error: ' + d.error); return null; }
    return d;
  } catch(e) { toast('Network error'); return null; }
}

// ── Load all data ─────────────────────────────────────────────────
async function loadAll() {
  const [r, s, b] = await Promise.all([
    api('/api/routes'),
    api('/api/stops'),
    api('/api/buses'),
  ]);
  routes = Array.isArray(r) ? r : [];
  stops  = Array.isArray(s) ? s : [];
  buses  = Array.isArray(b) ? b : [];
  rebuildRouteSelect();
  renderPanel();
  render();
}

function rebuildRouteSelect() {
  const sel = document.getElementById('rSel');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— Select route —</option>';
  routes.forEach(r => {
    const o = document.createElement('option');
    o.value = r.id;
    o.textContent = `${r.short_name} – ${r.name}`;
    sel.appendChild(o);
  });
  // Restore selection if still valid
  if (prev && routes.find(r => r.id === prev)) sel.value = prev;
}

document.getElementById('rSel').addEventListener('change', e => {
  activeRoute = routes.find(r => r.id === e.target.value) || null;
  pts = activeRoute ? parsePts(activeRoute.path_data) : [];
  selStop = null; selBus = null;
  updateDist();
  renderPanel();
  render();
});

function parsePts(data) {
  try { return JSON.parse(data || '[]'); } catch { return []; }
}

// ── Tool ──────────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tb[id^=t]').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('t' + t.charAt(0).toUpperCase() + t.slice(1));
  if (btn) btn.classList.add('on');
  const hints = {
    draw: 'Click to add waypoints. Right-click or Save Path when done.',
    stop: 'Click on the canvas to place a bus stop.',
    select: 'Click a stop or bus to select and edit it. Drag to move.',
    bus: 'Click anywhere on canvas to place a bus on the active route.',
  };
  document.getElementById('hint').textContent = hints[t] || '';
}
setTool('select');

// ── Canvas interactions ───────────────────────────────────────────
cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('contextmenu', e => { e.preventDefault(); if(tool==='draw') savePath(); });

function pos(e) {
  const r = cv.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function dist2(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

function onDown(e) {
  if (e.button !== 0) return;
  const p = pos(e);

  if (tool === 'select') {
    const hitStop = stops.find(s => dist2(p, s) < 14);
    if (hitStop) {
      selStop = hitStop; selBus = null;
      drag = { type:'stop', obj:hitStop, ox:p.x-hitStop.x, oy:p.y-hitStop.y };
      showTab('stops'); renderPanel(); render(); return;
    }
    const hitBus = buses.find(b => dist2(p, {x:b.current_x, y:b.current_y}) < 16);
    if (hitBus) {
      selBus = hitBus; selStop = null;
      drag = { type:'bus', obj:hitBus, ox:p.x-hitBus.current_x, oy:p.y-hitBus.current_y };
      showTab('buses'); renderPanel(); render(); return;
    }
    selStop = null; selBus = null; renderPanel(); render(); return;
  }

  if (tool === 'draw') {
    if (!activeRoute) { toast('Select a route first'); return; }
    pts.push({x:p.x, y:p.y});
    updateDist(); render(); return;
  }

  if (tool === 'stop') {
    if (!activeRoute) { toast('Select a route first'); return; }
    placeStop(p); return;
  }

  if (tool === 'bus') {
    if (!activeRoute) { toast('Select a route first'); return; }
    placeBus(p); return;
  }
}

function onMove(e) {
  if (!drag) return;
  const p = pos(e);
  if (drag.type === 'stop') { drag.obj.x = p.x - drag.ox; drag.obj.y = p.y - drag.oy; }
  else if (drag.type === 'bus') { drag.obj.current_x = p.x - drag.ox; drag.obj.current_y = p.y - drag.oy; }
  render();
}

async function onUp() {
  if (!drag) return;
  if (drag.type === 'stop') {
    const s = drag.obj;
    await api(`/api/stops/${s.id}`, 'PUT', {x:s.x, y:s.y});
  } else if (drag.type === 'bus') {
    const b = drag.obj;
    await api(`/api/buses/${b.id}`, 'PUT', {current_x:b.current_x, current_y:b.current_y});
  }
  drag = null;
}

// ── Path actions ──────────────────────────────────────────────────
function undoPt() { pts.pop(); updateDist(); render(); }
function clearPts() { if(confirm('Clear all waypoints?')) { pts=[]; updateDist(); render(); } }

function calcDist(p) {
  let d = 0;
  for(let i=1;i<p.length;i++) d += dist2(p[i-1],p[i]);
  return d;
}
function updateDist() {
  document.getElementById('distBadge').textContent = calcDist(pts).toFixed(2) + ' mi total';
}

async function savePath() {
  if (!activeRoute) { toast('No route selected'); return; }
  const d = calcDist(pts);
  const res = await api(`/api/routes/${activeRoute.id}`, 'PUT', { path_data: pts, total_distance: d });
  if (res) {
    activeRoute.path_data = JSON.stringify(pts);
    activeRoute.total_distance = d;
    const idx = routes.findIndex(r=>r.id===activeRoute.id);
    if(idx>=0) routes[idx] = {...routes[idx], path_data:JSON.stringify(pts), total_distance:d};
    toast('Path saved ✓');
    render();
  }
}

// ── Stop placement ────────────────────────────────────────────────
async function placeStop(p) {
  const name = prompt('Stop name:');
  if (!name?.trim()) return;
  const res = await api('/api/stops', 'POST', {
    name: name.trim(),
    x: p.x, y: p.y,
    routes: activeRoute ? [activeRoute.id] : [],
    rail_connections: [],
  });
  if (res?.id) {
    const ns = { id:res.id, name:name.trim(), x:p.x, y:p.y, routes:JSON.stringify(activeRoute?[activeRoute.id]:[]), rail_connections:'[]' };
    stops.push(ns);
    selStop = ns; selBus = null;
    showTab('stops');
    renderPanel(); render();
    toast('Stop placed ✓');
  }
}

// ── Bus placement ─────────────────────────────────────────────────
async function placeBus(p) {
  const num = prompt('Bus number (e.g. 101):');
  if (!num?.trim()) return;
  const res = await api('/api/buses', 'POST', {
    route_id: activeRoute.id,
    bus_number: num.trim(),
    current_x: p.x, current_y: p.y,
    current_speed: 25,
    status: 'in_service',
  });
  if (res?.id) {
    const nb = {
      id:res.id, bus_number:num.trim(),
      route_id:activeRoute.id, current_x:p.x, current_y:p.y,
      current_speed:25, status:'in_service',
      route_name:activeRoute.name, short_name:activeRoute.short_name, color:activeRoute.color,
    };
    buses.push(nb);
    selBus = nb; selStop = null;
    showTab('buses');
    renderPanel(); render();
    toast('Bus placed ✓');
  }
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = '#eeeeee';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = '#d8d8d8';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=50){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=50){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // Scale label
  ctx.fillStyle = '#aaa';
  ctx.font = '10px Helvetica';
  ctx.fillText('1 px = 1 mi', 8, H-8);

  // All saved routes
  routes.forEach(route => {
    const rpts = parsePts(route.path_data);
    if(rpts.length < 2) return;
    ctx.strokeStyle = route.color || '#FFD600';
    ctx.lineWidth = route.id === activeRoute?.id ? 5 : 3;
    ctx.globalAlpha = route.id === activeRoute?.id ? 1 : 0.45;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(rpts[0].x, rpts[0].y);
    rpts.forEach(p => ctx.lineTo(p.x,p.y));
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Unsaved draw path
  if(pts.length > 0 && activeRoute) {
    ctx.strokeStyle = activeRoute.color || '#FFD600';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([8,4]);
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => ctx.lineTo(p.x,p.y));
    ctx.stroke();
    ctx.setLineDash([]);

    // Segment distance labels
    for(let i=1;i<pts.length;i++) {
      const d = dist2(pts[i-1],pts[i]).toFixed(2);
      const mx = (pts[i-1].x + pts[i].x)/2;
      const my = (pts[i-1].y + pts[i].y)/2;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(mx-24,my-13,48,16);
      ctx.fillStyle = '#333';
      ctx.font = 'bold 9px Helvetica';
      ctx.textAlign = 'center';
      ctx.fillText(d+' mi', mx, my-0.5);
      ctx.textAlign = 'left';
    }

    // Waypoint dots
    pts.forEach((p,i) => {
      ctx.fillStyle = i===0 ? '#22aa55' : (activeRoute.color||'#FFD600');
      ctx.beginPath();
      ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fill();
    });
  }

  // Stops
  stops.forEach(s => {
    const isSel = selStop?.id === s.id;
    const hasRail = (() => { try { return JSON.parse(s.rail_connections||'[]').length > 0; } catch { return false; } })();
    ctx.fillStyle = isSel ? '#FFD600' : '#fff';
    ctx.strokeStyle = isSel ? '#000' : '#444';
    ctx.lineWidth = isSel ? 3 : 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, isSel ? 10 : 7, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    if(hasRail) {
      ctx.fillStyle = '#0057A8';
      ctx.beginPath();
      ctx.arc(s.x+5, s.y-5, 4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = '#111';
    ctx.font = isSel ? 'bold 12px Helvetica' : '11px Helvetica';
    ctx.fillText(s.name, s.x+13, s.y+4);
  });

  // Buses
  buses.forEach(b => {
    const x=b.current_x, y=b.current_y;
    const isSel = selBus?.id === b.id;
    const color = b.color || '#FFD600';
    ctx.fillStyle = color;
    ctx.strokeStyle = isSel ? '#000' : '#444';
    ctx.lineWidth = isSel ? 3 : 1.5;
    rr(ctx, x-13, y-8, 26,16, 3);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 8px Helvetica';
    ctx.textAlign = 'center';
    ctx.fillText(b.short_name || b.bus_number || '', x, y+3);
    ctx.textAlign = 'left';
    if(b.current_speed > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.font = '9px Helvetica';
      ctx.fillText(b.current_speed+' mph', x-13, y-11);
    }
  });
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── Panel ─────────────────────────────────────────────────────────
function showTab(t) {
  tab = t;
  document.querySelectorAll('.ptab').forEach(el => el.classList.toggle('on', el.dataset.tab === t));
  renderPanel();
}

function renderPanel() {
  const body = document.getElementById('pbody');
  if (tab==='routes') renderRoutes(body);
  else if (tab==='stops') renderStops(body);
  else renderBuses(body);
}

// ── Routes tab ────────────────────────────────────────────────────
function renderRoutes(body) {
  let h = `
    <div class="sec-title">New Route</div>
    <div class="fr"><label>Route Name</label><input id="rName" placeholder="1 – Downtown Express"></div>
    <div class="fr"><label>Short Name</label><input id="rShort" placeholder="1" maxlength="4"></div>
    <div class="fr"><label>Color</label>
      <div class="cr">
        <input type="color" id="rCP" value="#FFD600" oninput="document.getElementById('rCT').value=this.value">
        <input type="text" id="rCT" value="#FFD600" oninput="document.getElementById('rCP').value=this.value">
      </div>
    </div>
    <div class="fr"><label>Description</label><textarea id="rDesc"></textarea></div>
    <button class="btn btn-blk" onclick="createRoute()">+ Create Route</button>
    <hr class="divider">
    <div class="sec-title">All Routes (${routes.length})</div>`;

  if (!routes.length) {
    h += '<p style="font-size:12px;color:#aaa">No routes yet. Create one above.</p>';
  } else {
    routes.forEach(r => {
      const isSel = activeRoute?.id === r.id;
      h += `<div class="li ${isSel?'on':''}" onclick="selectRoute('${r.id}')">
        <div class="li-dot" style="background:${r.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="li-name">${r.short_name} – ${r.name}</div>
          <div class="li-meta">${r.total_distance ? r.total_distance.toFixed(2)+' mi' : 'No path'}</div>
        </div>
        <span class="li-del" onclick="delRoute(event,'${r.id}')">×</span>
      </div>`;
    });
  }

  body.innerHTML = h;
}

async function createRoute() {
  if (!key) { toast('Sign in first'); return; }
  const name = document.getElementById('rName').value.trim();
  const short_name = document.getElementById('rShort').value.trim();
  const color = document.getElementById('rCT').value.trim() || '#FFD600';
  const description = document.getElementById('rDesc').value.trim();
  if (!name || !short_name) { toast('Name and short name are required'); return; }
  const res = await api('/api/routes', 'POST', { name, short_name, color, description });
  if (res?.id) {
    const nr = { id:res.id, name, short_name, color, description, path_data:'[]', stops_order:'[]', total_distance:0, active:1 };
    routes.push(nr);
    rebuildRouteSelect();
    // Auto-select the new route
    activeRoute = nr;
    document.getElementById('rSel').value = nr.id;
    pts = [];
    updateDist();
    renderPanel();
    render();
    toast('Route created ✓');
  }
}

function selectRoute(id) {
  activeRoute = routes.find(r => r.id === id) || null;
  document.getElementById('rSel').value = activeRoute ? id : '';
  pts = activeRoute ? parsePts(activeRoute.path_data) : [];
  selStop = null; selBus = null;
  updateDist();
  renderPanel();
  render();
}

async function delRoute(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this route?')) return;
  const res = await api(`/api/routes/${id}`, 'DELETE');
  if (res) {
    routes = routes.filter(r => r.id !== id);
    if (activeRoute?.id === id) { activeRoute = null; pts = []; updateDist(); }
    rebuildRouteSelect();
    renderPanel(); render();
    toast('Route deleted');
  }
}

// ── Stops tab ─────────────────────────────────────────────────────
function renderStops(body) {
  if (selStop) {
    const s = selStop;
    const conns = (() => { try { return JSON.parse(s.rail_connections||'[]'); } catch { return []; } })();
    const tagsHtml = conns.length
      ? conns.map((rc,i) => {
          const rl = RAIL_LINES.find(l=>l.id===rc.line);
          return `<div class="rtag">
            <span style="width:8px;height:8px;border-radius:50%;background:${rl?.color||'#888'};display:inline-block"></span>
            ${rc.line} – ${rc.station_name}
            <span class="rm" onclick="rmRail(${i})">×</span>
          </div>`;
        }).join('')
      : '<span style="font-size:11px;color:#aaa">None</span>';

    body.innerHTML = `
      <button class="btn btn-sec" onclick="selStop=null;renderPanel()" style="margin-bottom:12px">← Back to list</button>
      <div class="fr"><label>Stop Name</label><input id="sN" value="${s.name}"></div>
      <div class="fr">
        <label>Rail Connections</label>
        <div class="rail-wrap" id="railWrap">${tagsHtml}</div>
        <div class="radd">
          <select id="rlSel"><option value="">Line…</option>${RAIL_LINES.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select>
          <input type="text" id="rlStn" placeholder="Station name">
          <button onclick="addRail()">Add</button>
        </div>
      </div>
      <button class="btn btn-blk" onclick="saveStop()">Save Stop</button>
      <button class="btn btn-red" onclick="delStop('${s.id}')">Delete Stop</button>`;
    return;
  }

  // List all stops (filtered to active route if one selected)
  const list = activeRoute
    ? stops.filter(s => { try { return JSON.parse(s.routes||'[]').includes(activeRoute.id); } catch { return false; } })
    : stops;

  let h = `<div class="sec-title">Stops${activeRoute ? ' on '+activeRoute.short_name : ''} (${list.length})</div>`;
  if (!list.length) {
    h += `<p style="font-size:12px;color:#aaa">${activeRoute ? 'No stops on this route yet.' : 'No stops yet.'} Use the Stop tool and click the map.</p>`;
  } else {
    list.forEach(s => {
      const hasRail = (() => { try { return JSON.parse(s.rail_connections||'[]').length > 0; } catch { return false; } })();
      h += `<div class="li ${selStop?.id===s.id?'on':''}" onclick="pickStop('${s.id}')">
        <div style="font-size:13px">●</div>
        <div style="flex:1;min-width:0">
          <div class="li-name">${s.name}</div>
          <div class="li-meta">${hasRail ? '🚇 Rail connection' : 'Bus only'}</div>
        </div>
        <span class="li-del" onclick="delStop(event,'${s.id}')">×</span>
      </div>`;
    });
  }
  body.innerHTML = h;
}

function pickStop(id) { selStop = stops.find(s=>s.id===id); renderPanel(); }

function addRail() {
  if (!selStop) return;
  const line = document.getElementById('rlSel').value;
  const stn = document.getElementById('rlStn').value.trim();
  if (!line || !stn) { toast('Select line and enter station name'); return; }
  const conns = (() => { try { return JSON.parse(selStop.rail_connections||'[]'); } catch { return []; } })();
  conns.push({ line, station_name: stn });
  selStop.rail_connections = JSON.stringify(conns);
  renderPanel();
}

function rmRail(idx) {
  if (!selStop) return;
  const conns = (() => { try { return JSON.parse(selStop.rail_connections||'[]'); } catch { return []; } })();
  conns.splice(idx, 1);
  selStop.rail_connections = JSON.stringify(conns);
  renderPanel();
}

async function saveStop() {
  if (!selStop) return;
  const name = document.getElementById('sN').value.trim();
  if (!name) { toast('Name required'); return; }
  const conns = (() => { try { return JSON.parse(selStop.rail_connections||'[]'); } catch { return []; } })();
  const res = await api(`/api/stops/${selStop.id}`, 'PUT', { name, rail_connections: conns });
  if (res) {
    selStop.name = name;
    const idx = stops.findIndex(s=>s.id===selStop.id);
    if(idx>=0) stops[idx] = { ...stops[idx], name, rail_connections: selStop.rail_connections };
    render();
    toast('Stop saved ✓');
  }
}

async function delStop(e, id) {
  if (typeof e==='object') { e.stopPropagation(); } else { id = e; }
  const sid = id || selStop?.id;
  if (!confirm('Delete this stop?')) return;
  const res = await api(`/api/stops/${sid}`, 'DELETE');
  if (res) {
    stops = stops.filter(s=>s.id!==sid);
    selStop = null;
    renderPanel(); render();
    toast('Stop deleted');
  }
}

// ── Buses tab ─────────────────────────────────────────────────────
function renderBuses(body) {
  if (selBus) {
    const b = selBus;
    body.innerHTML = `
      <button class="btn btn-sec" onclick="selBus=null;renderPanel()" style="margin-bottom:12px">← Back to list</button>
      <div class="spd">${b.current_speed || 0} <small>mph</small></div>
      <div class="fr"><label>Bus Number</label><input id="bN" value="${b.bus_number}"></div>
      <div class="fr"><label>Driver Name</label><input id="bD" value="${b.driver_name||''}"></div>
      <div class="fr"><label>Speed (mph)</label><input type="number" id="bS" value="${b.current_speed||0}" min="0" max="90"></div>
      <div class="fr"><label>Status</label>
        <select id="bSt">
          <option value="in_service" ${b.status==='in_service'?'selected':''}>In Service</option>
          <option value="out_of_service" ${b.status==='out_of_service'?'selected':''}>Out of Service</option>
          <option value="layover" ${b.status==='layover'?'selected':''}>Layover</option>
          <option value="breakdown" ${b.status==='breakdown'?'selected':''}>Breakdown</option>
        </select>
      </div>
      <button class="btn btn-blk" onclick="saveBus()">Save Bus</button>
      <button class="btn btn-red" onclick="delBus('${b.id}')">Remove Bus</button>`;
    return;
  }

  const list = activeRoute ? buses.filter(b=>b.route_id===activeRoute.id) : buses;
  const sColors = { in_service:'#22aa55', out_of_service:'#aaa', layover:'#F5A623', breakdown:'#d93025' };

  let h = `<div class="sec-title">Buses${activeRoute ? ' on '+activeRoute.short_name : ''} (${list.length})</div>`;
  if (!list.length) {
    h += `<p style="font-size:12px;color:#aaa">No buses${activeRoute?' on this route':''} yet. Use the Bus tool and click the map.</p>`;
  } else {
    list.forEach(b => {
      h += `<div class="li ${selBus?.id===b.id?'on':''}" onclick="pickBus('${b.id}')">
        <div class="sdot" style="background:${sColors[b.status]||'#aaa'}"></div>
        <div style="flex:1;min-width:0">
          <div class="li-name">Bus ${b.bus_number}</div>
          <div class="li-meta">${b.short_name||''} · ${b.current_speed||0} mph · ${b.status?.replace('_',' ')}</div>
        </div>
        <span class="li-del" onclick="delBus(event,'${b.id}')">×</span>
      </div>`;
    });
  }
  body.innerHTML = h;
}

function pickBus(id) { selBus = buses.find(b=>b.id===id); renderPanel(); }

async function saveBus() {
  if (!selBus) return;
  const bus_number = document.getElementById('bN').value.trim();
  const driver_name = document.getElementById('bD').value.trim();
  const current_speed = parseFloat(document.getElementById('bS').value)||0;
  const status = document.getElementById('bSt').value;
  const res = await api(`/api/buses/${selBus.id}`, 'PUT', { bus_number, driver_name, current_speed, status });
  if (res) {
    Object.assign(selBus, { bus_number, driver_name, current_speed, status });
    const idx = buses.findIndex(b=>b.id===selBus.id);
    if(idx>=0) buses[idx] = {...buses[idx], bus_number, driver_name, current_speed, status};
    render(); toast('Bus updated ✓');
  }
}

async function delBus(e, id) {
  if (typeof e==='object') { e.stopPropagation(); } else { id = e; }
  const bid = id || selBus?.id;
  if (!confirm('Remove this bus?')) return;
  const res = await api(`/api/buses/${bid}`, 'DELETE');
  if (res) {
    buses = buses.filter(b=>b.id!==bid);
    selBus = null;
    renderPanel(); render();
    toast('Bus removed');
  }
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display='none', 2800);
}

// ── Init ──────────────────────────────────────────────────────────
resizeCv();
if (key) loadAll();
else renderPanel();

// Wire up tab clicks
document.querySelectorAll('.ptab').forEach(t => {
  t.addEventListener('click', () => showTab(t.dataset.tab));
});

// Auto-refresh bus positions every 20s
setInterval(async () => {
  if (!key) return;
  const b = await api('/api/buses');
  if (Array.isArray(b)) { buses = b; render(); }
}, 20000);
</script>
</body>
</html>
